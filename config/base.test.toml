# Base test profile for pre-live validation.
#
# This profile keeps the same supported Base venue scope as config/base.toml:
# - symbols = [] means no configured symbol allowlist.
# - venues include every Base venue currently supported and verified by this codebase.
# - Aerodrome classic and Slipstream factories are enabled.
#
# Important: the current loader reads config/base.toml for --chain base.
# To use these values without code changes, copy this file over config/base.toml or manually copy the
# risk/search values below into config/base.toml. Environment variables such as BASE_MAX_POSITION_USD_E8
# override TOML values, so clear or update those .env overrides before relying on this profile.
#
# Still required in .env before live execution:
# SAFE_OWNER=0xbEA8fA57302325c7462EA2D4d8022E82a652D5eD
# BASE_EXECUTOR_ADDRESS=<deployed Base ArbitrageExecutor address>

chain = "base"
chain_id = 8453
native_symbol = "ETH"

# Keep route depth realistic for Base N-hop validation.
max_hops = 5

# Slightly stricter screening than the live profile to reduce noisy candidates during tests.
screening_margin_bps = 5

# Legacy raw-token fallbacks. For USDC-style 6-decimal assets these are approximately:
# min profit $0.10, max position $100, max flash loan $100, daily loss $5.
min_net_profit_default = 100000
max_position_default = 100000000
max_flash_loan_default = 100000000
daily_loss_limit_default = -5000000

# USD e8 risk values. These are the primary test limits when token prices are available.
# 10000000      = $0.10
# 1000000000    = $10
# 10000000000   = $100
# 500000000     = $5
min_net_profit_usd_e8 = 10000000
min_trade_usd_e8 = 1000000000
max_position_usd_e8 = 10000000000
max_flash_loan_usd_e8 = 10000000000
daily_loss_limit_usd_e8 = 500000000

# Faster test loop, still not a narrowed symbol/venue scope.
poll_interval_ms = 800
event_backfill_blocks = 32
staleness_timeout_ms = 900000

# Conservative gas/risk bounds for Base tests.
gas_risk_buffer_pct = 0.20
gas_price_ceiling_wei = 3000000000
pool_health_min_bps = 9000
stable_depeg_cutoff_e6 = 995000
strict_target_allowlist = true

[policy]
venues = ["uniswap_v2", "sushiswap_v2", "baseswap_v2", "aerodrome_v2", "uniswap_v3", "aerodrome_v3_legacy", "aerodrome_v3_caps", "aerodrome_v3", "curve", "balancer"]
symbols = []

[search]
top_k_paths_per_side = 12
max_virtual_branches_per_node = 32
path_beam_width = 192
max_candidates_per_refresh = 32
candidate_selection_buffer_multiplier = 4
dedup_token_paths = true
max_pair_edges_per_pair = 4
max_split_parallel_pools = 5

[[tokens]]
symbol = "USDC"
address_env = "BASE_USDC"
decimals = 6
is_stable = true
is_cycle_anchor = false
allow_self_funded = false
price_env = "BASE_USDC_PRICE_E8"

