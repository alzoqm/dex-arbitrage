version: '3.8'

services:
  dex-arbitrage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dex-arbitrage
    restart: unless-stopped
    environment:
      - CHAIN=base
      - BASE_PUBLIC_RPC_URL=${BASE_PUBLIC_RPC_URL}
      - BASE_PROTECTED_RPC_URL=${BASE_PROTECTED_RPC_URL}
      - BASE_EXECUTOR_ADDRESS=${BASE_EXECUTOR_ADDRESS}
      - OPERATOR_PRIVATE_KEY=${OPERATOR_PRIVATE_KEY}
      - SIMULATION_ONLY=${SIMULATION_ONLY:-true}
      - PROMETHEUS_BIND=0.0.0.0:9898
      - RPC_PROVIDER_MODE=payg
      - ALLOW_PUBLIC_FALLBACK=false
    ports:
      - "9898:9898"
    volumes:
      - ./state:/home/arbitrage/state
    networks:
      - arbitrage-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9898/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - arbitrage-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - arbitrage-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  arbitrage-net:
    driver: bridge
